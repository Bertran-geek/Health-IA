# ============================================================
# Health Campaign AI - Docker Compose
# Joins the EXISTING database network `health_campaign_manager_default`
# so the API can reach the running `health_campaign_db` container.
# Uses Groq (free online AI) instead of local Ollama.
# ============================================================

services:
  # ---- FastAPI AI backend ----
  ai_backend:
    build: .
    container_name: health_campaign_ai
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_URL=mysql+pymysql://health_user:health_pass@health_campaign_db:3306/health_campaign_manager
    ports:
      - "8001:8001"
    volumes:
      - ./frontend/dist:/app/frontend/dist:ro
    networks:
      - health_campaign_manager_default
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ---- Optional Redis cache (enable with REDIS_ENABLED=true) ----
  redis:
    image: redis:7-alpine
    container_name: health_campaign_ai_redis
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    networks:
      - health_campaign_manager_default
    deploy:
      resources:
        limits:
          memory: 160m

networks:
  health_campaign_manager_default:
    external: true
